<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Social links profile | Frontend Mentor</title>
  <meta name="description"
    content="A responsive social links profile card built with semantic HTML, modern CSS and accessibility best practices.">
  <link rel="canonical" href="https://vimpdev.github.io/fem-18-social-links-profile/">

  <meta name="theme-color" content="#141414">

  <link rel="preload" href="./assets/fonts/inter-vf.woff2" as="font" type="font/woff2" crossorigin="anonymous">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vimpdev.github.io/fem-18-social-links-profile/">
  <meta property="og:site_name" content="VIMP Frontend Mentor Solutions">
  <meta property="og:title" content="Social links profile | Frontend Mentor">
  <meta property="og:description"
    content="A responsive social links profile card built with semantic HTML, modern CSS and accessibility best practices.">
  <meta property="og:image" content="https://vimpdev.github.io/fem-18-social-links-profile/docs/preview-og.png">
  <meta property="og:image:alt" content="Preview of a social links profile card showing interactive link states">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://vimpdev.github.io/fem-18-social-links-profile/">
  <meta name="twitter:title" content="Social links profile | Frontend Mentor">
  <meta name="twitter:description"
    content="A responsive social links profile card built with semantic HTML, modern CSS and accessibility best practices.">
  <meta name="twitter:image" content="https://vimpdev.github.io/fem-18-social-links-profile/docs/preview-og.png">
  <meta name="twitter:image:alt" content="Preview of a social links profile card showing interactive link states">

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="stylesheet" href="./styles/main.css">
</head>

<body>

  <main>
    <h1 class="visually-hidden">Social Links Profile</h1>

    <article class="card">
      <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall" class="card__avatar">
      <h2 class="card__name">Jessica Randall</h2>
      <p class="card__location">London, United Kingdom</p>
      <p class="card__bio">Front-end developer and avid reader.</p>

      <ul class="card__links">
        <li>
          <a href="https://github.com/" class="card__link">GitHub</a>
        </li>
        <li>
          <a href="https://www.frontendmentor.io/" class="card__link">Frontend Mentor</a>
        </li>
        <li>
          <a href="https://www.linkedin.com/" class="card__link">LinkedIn</a>
        </li>
        <li>
          <a href="https://x.com/" class="card__link" aria-label="X (formerly Twitter)">X</a>
        </li>
        <li>
          <a href="https://www.instagram.com/" class="card__link">Instagram</a>
        </li>
      </ul>
    </article>
  </main>

  <footer class="attribution">
    <small>
      Challenge by <a href="https://www.frontendmentor.io/challenges/" target="_blank" rel="noopener noreferrer"
        class="attribution__link">Frontend Mentor</a> &ndash; Coded by <a
        href="https://www.frontendmentor.io/profile/vimpdev" target="_blank" rel="noopener noreferrer"
        class="attribution__link">VIMP</a>
    </small>
  </footer>
</body>

</html>
